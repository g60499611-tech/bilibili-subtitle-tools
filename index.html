<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站字幕提取工具</title>
    <!-- 引入依赖库 -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            /* 粉黑紫渐变背景 - 科技感华丽风 */
            background: linear-gradient(135deg, #121212 0%, #2a0845 50%, #5c075e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #ffffff;
            /* 背景光效 */
            background-attachment: fixed;
            position: relative;
        }

        /* 科技感装饰光效 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(246, 135, 179, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 70% 80%, rgba(167, 139, 250, 0.15) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            /* 玻璃质感容器边框 */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(167, 139, 250, 0.2);
        }

        /* 标题样式 - 科技感渐变+发光 */
        h1 {
            text-align: center;
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #f687b3 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(246, 135, 179, 0.4);
            letter-spacing: 1px;
        }

        /* API输入区域 */
        .api-input-area {
            margin-bottom: 25px;
        }

        .api-input-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .api-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid rgba(167, 139, 250, 0.3);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.95);
            color: #121212;
            /* 科技感输入框阴影 */
            box-shadow: inset 0 0 8px rgba(167, 139, 250, 0.1);
        }

        .api-input:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.4);
        }

        /* 链接输入区域 */
        .link-input-area {
            margin-bottom: 35px;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .link-input {
            flex: 1;
            padding: 18px 22px;
            border: 2px solid rgba(167, 139, 250, 0.3);
            border-radius: 12px;
            font-size: 17px;
            outline: none;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.95);
            color: #121212;
            box-shadow: inset 0 0 8px rgba(167, 139, 250, 0.1);
        }

        .link-input:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.4);
        }

        /* 渐变按钮通用样式 - 科技感华丽版 */
        .gradient-btn {
            padding: 16px 36px;
            background: linear-gradient(135deg, #f687b3 0%, #a78bfa 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            /* 按钮发光效果 */
            box-shadow: 0 4px 15px rgba(246, 135, 179, 0.3);
            position: relative;
            overflow: hidden;
        }

        .gradient-btn::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.6s ease;
        }

        .gradient-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(167, 139, 250, 0.5);
        }

        .gradient-btn:hover::after {
            left: 100%;
        }

        .gradient-btn:disabled {
            background: #444444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.7;
        }

        /* 白色按钮通用样式 - 科技感 */
        .white-btn {
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #a78bfa;
            border-radius: 12px;
            color: #121212;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            /* 科技感按钮效果 */
            box-shadow: 0 4px 12px rgba(167, 139, 250, 0.2);
            position: relative;
            overflow: hidden;
        }

        .white-btn::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(167, 139, 250, 0.1), transparent);
            transition: all 0.6s ease;
        }

        .white-btn:hover {
            border-color: #f687b3;
            color: #a78bfa;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(246, 135, 179, 0.3);
        }

        .white-btn:hover::after {
            left: 100%;
        }

        .white-btn:disabled {
            background: rgba(255, 255, 255, 0.5);
            border-color: #888888;
            color: #666666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.8;
        }

        /* 提示区域 */
        .tip-area {
            text-align: center;
            margin-bottom: 25px;
            font-size: 17px;
            color: #e0e0e0;
            min-height: 28px;
            font-weight: 500;
        }

        .error-tip {
            color: #ff6b8b;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 107, 139, 0.4);
        }

        .success-tip {
            color: #4ade80;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.4);
        }

        /* 功能卡片容器 */
        .card-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        /* 卡片样式 - 白色底色+科技感边框 */
        .function-card {
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid;
            border-image: linear-gradient(135deg, #f687b3 0%, #a78bfa 100%) 1;
            border-radius: 20px;
            padding: 35px 28px;
            box-shadow: 0 8px 30px rgba(167, 139, 250, 0.25);
            display: flex;
            flex-direction: column;
            gap: 25px;
            /* 卡片悬浮效果 */
            transition: all 0.4s ease;
        }

        .function-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(167, 139, 250, 0.4);
        }

        .card-title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #f687b3 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            color: #121212;
            letter-spacing: 0.5px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 预览区域 */
        .preview-area {
            margin-bottom: 50px;
        }

        .preview-card {
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid rgba(167, 139, 250, 0.5);
            border-radius: 20px;
            padding: 30px 28px;
            box-shadow: 0 8px 30px rgba(167, 139, 250, 0.2);
            margin-bottom: 25px;
            color: #121212;
        }

        .preview-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #121212;
            border-bottom: 2px solid rgba(167, 139, 250, 0.2);
            padding-bottom: 10px;
        }

        .note-content {
            line-height: 1.8;
            font-size: 16px;
            color: #222222;
            white-space: pre-wrap;
            padding: 10px;
        }

        .mindmap-content {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            overflow: auto;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            margin: 10px 0;
        }

        /* 底部免责声明 */
        .footer {
            text-align: center;
            font-size: 13px;
            color: #bbbbbb;
            margin-top: 70px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <h1>B站字幕提取工具</h1>

        <!-- API密钥输入区域 -->
        <div class="api-input-area">
            <div class="api-input-wrapper">
                <input type="password" class="api-input" id="apiKey" placeholder="请输入DeepSeek API密钥（仅用于AI生成功能，密钥仅保存在本地）">
            </div>
        </div>

        <!-- 链接输入区域 -->
        <div class="link-input-area">
            <div class="input-wrapper">
                <input type="text" class="link-input" id="bilibiliLink" placeholder="请粘贴B站视频网页链接">
                <button class="gradient-btn" id="extractBtn">提取字幕</button>
            </div>
        </div>

        <!-- 提示区域 -->
        <div class="tip-area" id="tipArea"></div>

        <!-- 功能卡片区域 -->
        <div class="card-container">
            <!-- 左侧字幕下载卡片 -->
            <div class="function-card">
                <h2 class="card-title">下载字幕报告</h2>
                <button class="white-btn" id="downloadSubtitleBtn" disabled>下载字幕TXT文件</button>
            </div>

            <!-- 右侧AI生成卡片 -->
            <div class="function-card">
                <h2 class="card-title">生成思维导图/笔记文档</h2>
                <div class="btn-group">
                    <button class="white-btn" id="generateMindmapBtn" disabled>生成思维导图</button>
                    <button class="white-btn" id="generateNoteBtn" disabled>生成重点笔记</button>
                </div>
            </div>
        </div>

        <!-- 预览区域 -->
        <div class="preview-area" id="previewArea"></div>

        <!-- 底部免责声明 -->
        <div class="footer">
            本工具仅用于个人学习使用，请勿用于商业用途
        </div>
    </div>

    <script>
        // 初始化mermaid
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            themeVariables: {
                primaryColor: '#f3e8ff',
                primaryBorderColor: '#a78bfa',
                primaryTextColor: '#121212',
                lineColor: '#f687b3',
                secondaryColor: '#fce7f3'
            }
        });

        // 全局变量
        let currentVideoInfo = {
            title: '',
            upName: '',
            subtitle: '',
            duration: 0
        };
        let isGenerating = false; // 生成锁，防止同时生成多个内容

        // DOM元素
        const extractBtn = document.getElementById('extractBtn');
        const downloadSubtitleBtn = document.getElementById('downloadSubtitleBtn');
        const generateMindmapBtn = document.getElementById('generateMindmapBtn');
        const generateNoteBtn = document.getElementById('generateNoteBtn');
        const bilibiliLink = document.getElementById('bilibiliLink');
        const apiKey = document.getElementById('apiKey');
        const tipArea = document.getElementById('tipArea');
        const previewArea = document.getElementById('previewArea');

        // 工具函数：设置提示
        function setTip(text, type = 'normal') {
            tipArea.textContent = text;
            tipArea.className = 'tip-area';
            if (type === 'error') tipArea.classList.add('error-tip');
            if (type === 'success') tipArea.classList.add('success-tip');
        }

        // 工具函数：重置所有按钮状态
        function resetAllBtn() {
            downloadSubtitleBtn.disabled = true;
            generateMindmapBtn.disabled = true;
            generateNoteBtn.disabled = true;
        }

        // 工具函数：从B站链接中提取BV号
        function getBvidFromLink(link) {
            const bvRegex = /BV[0-9a-zA-Z]+/;
            const match = link.match(bvRegex);
            return match ? match[0] : null;
        }

        // 工具函数：生成TXT文件并下载
        function downloadTxt(content, fileName) {
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            saveAs(blob, fileName);
        }

        // 工具函数：生成Word文件并下载
        async function downloadWord(content, fileName) {
            const { Document, Packer, Paragraph, TextRun, HeadingLevel } = window.docx;
            
            // 拆分内容
            const lines = content.split('\n').filter(line => line.trim() !== '');
            const doc = new Document({
                sections: [{
                    properties: {},
                    children: lines.map(line => {
                        // 标题处理
                        if (line.startsWith('视频标题：') || line.startsWith('UP主：') || line.startsWith('视频整体总结：')) {
                            return new Paragraph({
                                heading: HeadingLevel.HEADING_2,
                                children: [new TextRun({ text: line, bold: true, size: 24 })]
                            });
                        }
                        // 重点项处理
                        if (/^\d+、/.test(line)) {
                            return new Paragraph({
                                indent: { firstLine: 400 },
                                children: [new TextRun({ text: line, size: 22 })]
                            });
                        }
                        // 普通文本
                        return new Paragraph({
                            children: [new TextRun({ text: line, size: 22 })]
                        });
                    })
                }]
            });

            const buffer = await Packer.toBuffer(doc);
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
            saveAs(blob, fileName);
        }

        // 工具函数：调用DeepSeek API
        async function callDeepSeekAPI(prompt) {
            const key = apiKey.value.trim();
            if (!key) {
                setTip('出错了', 'error');
                throw new Error('无API密钥');
            }

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: '你是一个专业的内容整理助手，严格按照用户的要求输出内容，不要添加额外的解释和说明。' },
                            { role: 'user', content: prompt }
                        ],
                        temperature: 0.7,
                        stream: false
                    })
                });

                if (!response.ok) {
                    setTip('出错了', 'error');
                    throw new Error('API调用失败');
                }

                const data = await response.json();
                return data.choices[0].message.content.trim();
            } catch (error) {
                setTip('出错了', 'error');
                throw error;
            }
        }

        // 1. 提取字幕核心逻辑
        extractBtn.addEventListener('click', async () => {
            const link = bilibiliLink.value.trim();
            if (!link) {
                setTip('出错了', 'error');
                return;
            }

            // 提取BV号
            const bvid = getBvidFromLink(link);
            if (!bvid) {
                setTip('出错了', 'error');
                return;
            }

            // 按钮状态控制
            extractBtn.disabled = true;
            extractBtn.textContent = '正在提取...';
            setTip('正在提取字幕，请稍等，预计需要3-10秒');
            resetAllBtn();
            previewArea.innerHTML = '';

            try {
                // 步骤1：获取视频基本信息
                const videoInfoRes = await fetch(`https://api.bilibili.com/x/web-interface/view?bvid=${bvid}`);
                if (!videoInfoRes.ok) {
                    setTip('出错了', 'error');
                    return;
                }
                const videoInfoData = await videoInfoRes.json();
                if (videoInfoData.code !== 0) {
                    setTip('出错了', 'error');
                    return;
                }

                // 提取视频信息
                const videoData = videoInfoData.data;
                currentVideoInfo.title = videoData.title;
                currentVideoInfo.upName = videoData.owner.name;
                currentVideoInfo.duration = videoData.duration;

                // 校验视频时长（不超过1小时）
                if (currentVideoInfo.duration > 3600) {
                    setTip('出错了', 'error');
                    return;
                }

                // 步骤2：获取字幕列表
                const cid = videoData.cid;
                const subtitleRes = await fetch(`https://api.bilibili.com/x/player/v2?bvid=${bvid}&cid=${cid}`);
                if (!subtitleRes.ok) {
                    setTip('出错了', 'error');
                    return;
                }
                const subtitleData = await subtitleRes.json();
                if (subtitleData.code !== 0) {
                    setTip('出错了', 'error');
                    return;
                }

                // 查找中文字幕
                const subtitleList = subtitleData.data.subtitle?.subtitles || [];
                const chineseSubtitle = subtitleList.find(item => item.lan === 'zh-CN');
                if (!chineseSubtitle) {
                    setTip('出错了', 'error');
                    return;
                }

                // 步骤3：获取字幕内容
                const subtitleContentRes = await fetch(`https:${chineseSubtitle.subtitle_url}`);
                if (!subtitleContentRes.ok) {
                    setTip('出错了', 'error');
                    return;
                }
                const subtitleContentData = await subtitleContentRes.json();

                // 拼接字幕内容
                const subtitleText = subtitleContentData.body.map(item => item.content).join('\n');
                currentVideoInfo.subtitle = subtitleText;

                // 生成字幕报告内容
                const subtitleReport = `视频标题：${currentVideoInfo.title}\nUP主：${currentVideoInfo.upName}\n\n字幕内容：\n${currentVideoInfo.subtitle}`;
                currentVideoInfo.reportContent = subtitleReport;

                // 成功提示与按钮激活
                setTip('字幕提取成功', 'success');
                downloadSubtitleBtn.disabled = false;
                generateMindmapBtn.disabled = false;
                generateNoteBtn.disabled = false;

            } catch (error) {
                setTip('出错了', 'error');
                console.error(error);
            } finally {
                // 恢复按钮状态
                extractBtn.disabled = false;
                extractBtn.textContent = '提取字幕';
            }
        });

        // 2. 下载字幕报告
        downloadSubtitleBtn.addEventListener('click', () => {
            if (!currentVideoInfo.reportContent) {
                setTip('出错了', 'error');
                return;
            }
            downloadTxt(currentVideoInfo.reportContent, 'B站字幕.txt');
            setTip('字幕文件下载成功', 'success');
        });

        // 3. 生成重点笔记
        generateNoteBtn.addEventListener('click', async () => {
            if (isGenerating || !currentVideoInfo.subtitle) {
                setTip('出错了', 'error');
                return;
            }

            // 状态锁定
            isGenerating = true;
            generateNoteBtn.disabled = true;
            generateNoteBtn.textContent = '正在生成...';
            generateMindmapBtn.disabled = true;
            setTip('正在生成中，请耐心等待，预计需要10-30秒');

            try {
                // 构建prompt，严格按照用户要求
                const prompt = `
                以下是B站视频的字幕内容，视频标题是《${currentVideoInfo.title}》，UP主是${currentVideoInfo.upName}。
                请你按照以下要求生成重点笔记：
                1. 开头第一行写"视频标题：${currentVideoInfo.title}"，第二行写"UP主：${currentVideoInfo.upName}"
                2. 接下来写"视频整体总结："，然后用一段话总结整个视频的核心内容
                3. 最后分点列出视频里最核心的重点，用"数字、"的格式，最多不超过10条，只提取最核心的内容
                4. 不要添加任何额外的解释、说明、标题，严格按照以上格式输出

                字幕内容：
                ${currentVideoInfo.subtitle}
                `;

                // 调用API
                const noteContent = await callDeepSeekAPI(prompt);
                currentVideoInfo.noteContent = noteContent;

                // 渲染预览
                const notePreview = `
                <div class="preview-card" id="notePreview">
                    <h3 class="preview-title">重点笔记预览</h3>
                    <div class="note-content">${noteContent}</div>
                    <button class="white-btn" id="downloadNoteBtn" style="width: auto; margin-top: 20px;">下载Word笔记文档</button>
                </div>
                `;
                previewArea.insertAdjacentHTML('afterbegin', notePreview);

                // 绑定下载事件
                document.getElementById('downloadNoteBtn').addEventListener('click', () => {
                    downloadWord(noteContent, 'B站视频重点笔记.docx');
                    setTip('笔记文档下载成功', 'success');
                });

                setTip('重点笔记生成成功', 'success');

            } catch (error) {
                setTip('出错了', 'error');
                console.error(error);
            } finally {
                // 恢复状态
                isGenerating = false;
                generateNoteBtn.disabled = false;
                generateNoteBtn.textContent = '生成重点笔记';
                generateMindmapBtn.disabled = false;
            }
        });

        // 4. 生成思维导图
        generateMindmapBtn.addEventListener('click', async () => {
            if (isGenerating || !currentVideoInfo.subtitle) {
                setTip('出错了', 'error');
                return;
            }

            // 状态锁定
            isGenerating = true;
            generateMindmapBtn.disabled = true;
            generateMindmapBtn.textContent = '正在生成...';
            generateNoteBtn.disabled = true;
            setTip('正在生成中，请耐心等待，预计需要10-30秒');

            try {
                // 构建prompt，严格按照用户要求
                const prompt = `
                以下是B站视频的字幕内容，视频标题是《${currentVideoInfo.title}》。
                请你严格按照视频里说话的先后顺序，生成思维导图的markdown代码，使用mermaid的mindmap语法，要求如下：
                1. 根节点是视频标题《${currentVideoInfo.title}》
                2. 严格按照视频说话的先后顺序，一层一层往下细分内容，不要打乱顺序，不要分类整合
                3. 生成完整的内容，不要遗漏核心信息
                4. 只输出mermaid的mindmap代码，不要添加任何额外的解释、说明、markdown标记，直接输出代码内容

                字幕内容：
                ${currentVideoInfo.subtitle}
                `;

                // 调用API
                const mermaidCode = await callDeepSeekAPI(prompt);
                currentVideoInfo.mindmapCode = mermaidCode;

                // 渲染预览
                const mindmapPreview = `
                <div class="preview-card" id="mindmapPreview">
                    <h3 class="preview-title">思维导图预览</h3>
                    <div class="mindmap-content" id="mindmapContainer"></div>
                    <button class="white-btn" id="downloadMindmapBtn" style="width: auto; margin-top: 20px;">下载思维导图PNG图片</button>
                </div>
                `;
                previewArea.insertAdjacentHTML('afterbegin', mindmapPreview);

                // 渲染mermaid思维导图
                const mindmapContainer = document.getElementById('mindmapContainer');
                const { svg } = await mermaid.render('mindmapSvg', mermaidCode);
                mindmapContainer.innerHTML = svg;

                // 绑定下载事件
                document.getElementById('downloadMindmapBtn').addEventListener('click', () => {
                    const svgElement = document.getElementById('mindmapSvg');
                    const svgData = new XMLSerializer().serializeToString(svgElement);
                    const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = 'white';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0);
                        
                        canvas.toBlob((blob) => {
                            saveAs(blob, 'B站视频思维导图.png');
                            setTip('思维导图下载成功', 'success');
                            URL.revokeObjectURL(url);
                        });
                    };
                    img.src = url;
                });

                setTip('思维导图生成成功', 'success');

            } catch (error) {
                setTip('出错了', 'error');
                console.error(error);
            } finally {
                // 恢复状态
                isGenerating = false;
                generateMindmapBtn.disabled = false;
                generateMindmapBtn.textContent = '生成思维导图';
                generateNoteBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
